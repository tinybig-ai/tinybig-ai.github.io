<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: none; }
    </style>

    <linearGradient id="orangeLinear" x1="20%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#ff9d28" />
      <stop offset="40%" stop-color="#ff5900" />
      <stop offset="80%" stop-color="#d62400" />
      <stop offset="100%" stop-color="#9e0e00" />
    </linearGradient>

    <linearGradient id="blueLinearInverted" x1="80%" y1="15%" x2="20%" y2="85%">
      <stop offset="0%" stop-color="#69efff" />
      <stop offset="35%" stop-color="#2ca4dd" />
      <stop offset="75%" stop-color="#0a5fa6" />
      <stop offset="100%" stop-color="#02336c" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="6" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect class="bg" width="400" height="400" />

  <circle cx="170" cy="190" r="105" fill="url(#orangeLinear)" filter="url(#shadow)" />

  <circle cx="310" cy="251.25" r="48" fill="url(#blueLinearInverted)" filter="url(#shadow)" />
</svg>
