<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>labs — tinybig</title>
<link rel="icon" type="image/svg+xml" href="/icons/tinybig.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;900&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0b;
    color: #e8e8ea;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  ::selection { background: #FF5A00; color: #0a0a0b; }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 2.5rem;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    mix-blend-mode: difference;
  }

  nav a {
    color: #e8e8ea;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: opacity 0.3s;
  }

  nav a:hover { opacity: 0.6; }

  section {
    position: relative;
    padding: 6rem 2.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 2.5rem 6rem;
    position: relative;
    overflow: hidden;
  }

  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    position: relative;
    z-index: 2;
  }

  .section-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #666678;
    margin-bottom: 1rem;
  }

  .hero-title {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(4rem, 12vw, 10rem);
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: #e8e8ea;
    margin-bottom: 1.5rem;
  }

  .hero-title .dot { color: #FF5A00; }

  .hero-sub {
    font-size: clamp(1rem, 2vw, 1.35rem);
    color: #666678;
    max-width: 520px;
    line-height: 1.6;
    margin-bottom: 3rem;
  }

  .geo-block {
    position: absolute;
    top: 20%;
    right: -10%;
    width: 35vw;
    height: 60vh;
    background: #FF5A00;
    clip-path: polygon(0% 0%, 100% 15%, 85% 100%, 0% 85%);
    opacity: 0.06;
    z-index: 0;
  }

  .geo-line {
    position: absolute;
    bottom: 10%;
    left: 5%;
    width: 30vw;
    height: 1px;
    background: #00A3E0;
    opacity: 0.1;
    z-index: 0;
    transform: rotate(8deg);
  }

  .placeholder {
    color: #3a3a44;
    font-size: 0.9rem;
    font-weight: 500;
    border: 1px solid #1e1e24;
    padding: 1rem 1.5rem;
    display: inline-block;
  }

  footer {
    padding: 3rem 2.5rem;
    border-top: 1px solid #1e1e24;
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }

  footer .footer-logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: -0.03em;
  }

  footer .footer-links { display: flex; gap: 1.5rem; }

  footer a {
    color: #666678;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    transition: color 0.3s;
  }

  footer a:hover { color: #e8e8ea; }

  @media (max-width: 768px) {
    section { padding: 4rem 1.5rem; }
    .hero { padding: 6rem 1.5rem 4rem; }
    footer {
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem 1.5rem;
    }
  }
</style>
</head>
<body>

<nav>
  <a href="/">tinybig.</a>
  <a href="/keep/">keep.</a>
</nav>

<section class="hero">
  <div class="geo-block"></div>
  <div class="geo-line"></div>
  <div class="hero-inner">
    <p class="section-label">research</p>
    <h1 class="hero-title">labs<span class="dot">.</span></h1>
    <p class="hero-sub">
      Cutting-edge research and experimental builds.<br>
      What's next for tinybig.
    </p>
    <div class="placeholder">nothing here yet — stay tuned</div>
  </div>
</section>

<footer>
  <div class="footer-logo">tinybig<span style="color:#FF5A00;">.</span></div>
  <div class="footer-links">
    <a href="/keep/">keep.</a>
    <a href="/labs/">labs</a>
  </div>
</footer>

</body>
</html>
