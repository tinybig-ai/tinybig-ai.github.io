<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinybig AI</title>
<link rel="icon" type="image/svg+xml" href="/icons/tinybig.svg">
<link rel="alternate icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;900&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0b;
    color: #e8e8ea;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 640px;
  }

  .logo {
    width: 120px;
    height: auto;
    margin-bottom: 2.5rem;
    filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.03));
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 3.5rem;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #f0f0f5 0%, #8888a0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    font-size: 1.15rem;
    color: #666678;
    line-height: 1.6;
    margin-bottom: 3rem;
  }

  .links {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .links a {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    color: #a0a0b0;
    text-decoration: none;
    padding: 0.65rem 1.4rem;
    border: 1px solid #1e1e24;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .links a:hover {
    color: #e8e8ea;
    border-color: #3a3a44;
    background: #121216;
  }

  .footer {
    margin-top: 4rem;
    font-size: 0.75rem;
    color: #3a3a44;
  }
</style>
</head>
<body>
<div class="container">
  <img src="logo.svg" alt="Tinybig AI" class="logo">
  <h1>Tinybig</h1>
  <p class="tagline">
    AI harnesses for individual power users
  </p>
  <div class="links">
    <a href="/keep/">Keep</a>
    <a href="/about/">About</a>
    <a href="https://github.com/tinybig-ai/ideas">Ideas</a>
    <a href="https://github.com/tinybig-ai/visor">Visor</a>
  </div>
  <div class="footer">tinybig.ai</div>
</div>
</body>
</html>
